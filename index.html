<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a35">
<title>Aya AI - by Arazy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #0d0520;
    --bg2: #1a0a35;
    --bg3: #251548;
    --gold: #d4af37;
    --gold2: #f0d060;
    --purple: #7c3aed;
    --purple2: #a78bfa;
    --purple3: #c4b5fd;
    --text: #f0eaff;
    --text2: #c4b5fd;
    --text3: #8b7aaa;
    --user-bubble: #2d1b55;
    --aya-bubble: #1e0f3a;
    --border: rgba(124,58,237,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }

  .splash-logo {
    width: 120px;
    height: 120px;
    border-radius: 28px;
    background: linear-gradient(135deg, #1a0a35, #2d1b55);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 0 40px rgba(124,58,237,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  .splash-logo svg { width: 72px; height: 72px; }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 40px rgba(124,58,237,0.4); }
    50% { box-shadow: 0 0 70px rgba(124,58,237,0.7); }
  }

  .splash-name {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--gold2), var(--purple2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .splash-sub { font-size: 13px; color: var(--purple2); letter-spacing: 6px; margin-bottom: 4px; }
  .splash-by { font-size: 11px; color: var(--text3); letter-spacing: 3px; margin-bottom: 40px; }
  .splash-loader { width: 180px; height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .splash-loader-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--gold));
    border-radius: 2px;
    animation: load 2.2s ease forwards;
  }
  @keyframes load { from{width:0} to{width:100%} }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--purple), #3b0764);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 15px rgba(124,58,237,0.4);
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; color: var(--gold); }
  .header-status { font-size: 11px; color: var(--purple2); }
  .header-mode { display: flex; gap: 6px; }
  .mode-btn {
    padding: 5px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text3); font-family: 'Tajawal', sans-serif;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active { background: var(--purple); border-color: var(--purple); color: white; }

  .lang-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex; gap: 6px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
  }
  .lang-bar::-webkit-scrollbar { display: none; }
  .lang-btn {
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text3); font-family: 'Tajawal', sans-serif;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; flex-shrink: 0;
  }
  .lang-btn.active {
    background: linear-gradient(135deg, var(--purple), #5b21b6);
    border-color: var(--purple); color: white;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 16px; display: flex;
    flex-direction: column; gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg3) transparent;
  }
  .msg { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg.user { margin-right: auto; flex-direction: row-reverse; }
  .msg.aya { margin-left: auto; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; align-self: flex-end;
  }
  .msg.aya .msg-avatar { background: linear-gradient(135deg, var(--purple), #3b0764); }
  .msg.user .msg-avatar { background: var(--bg3); }
  .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.7; }
  .msg.aya .msg-bubble {
    background: var(--aya-bubble); border: 1px solid var(--border);
    border-bottom-right-radius: 4px; color: var(--text);
  }
  .msg.user .msg-bubble {
    background: var(--user-bubble); border: 1px solid rgba(124,58,237,0.3);
    border-bottom-left-radius: 4px; color: var(--text);
  }

  .typing { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; background: var(--purple2);
    border-radius: 50%; animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .welcome { text-align: center; padding: 32px 16px; color: var(--text3); }
  .welcome-icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 20px; color: var(--gold); margin-bottom: 8px; }
  .welcome p { font-size: 13px; line-height: 1.8; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
  .suggestion {
    padding: 7px 14px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 20px;
    font-size: 12px; color: var(--text2); cursor: pointer;
    transition: all 0.2s; font-family: 'Tajawal', sans-serif;
  }
  .suggestion:hover { background: var(--purple); border-color: var(--purple); color: white; }

  .input-area {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 12px 16px; display: flex; gap: 10px;
    align-items: flex-end; flex-shrink: 0;
  }
  #userInput {
    flex: 1; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 10px 14px; color: var(--text);
    font-family: 'Tajawal', sans-serif; font-size: 14px;
    outline: none; resize: none; max-height: 100px;
    line-height: 1.5; transition: border-color 0.2s;
  }
  #userInput:focus { border-color: var(--purple); }
  #userInput::placeholder { color: var(--text3); }

  #sendBtn {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--purple), #5b21b6);
    border: none; border-radius: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  #sendBtn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(124,58,237,0.4); }
  #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #sendBtn svg { width: 18px; height: 18px; fill: white; }

  #voiceBtn {
    width: 42px; height: 42px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
    flex-shrink: 0; font-size: 18px;
  }
  #voiceBtn:hover { border-color: var(--purple); }
  #voiceBtn.speaking { background: var(--purple); border-color: var(--purple); animation: pulse 1s ease-in-out infinite; }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">
    <svg viewBox="0 0 72 72" fill="none">
      <path d="M28,52 Q22,48 20,40 Q18,32 22,24 Q27,15 36,13 Q45,11 50,18 Q56,26 54,36 Q52,44 46,50 Q40,56 34,55Z" fill="#d4af37" opacity="0.9"/>
      <path d="M28,52 Q24,50 22,46 Q20,42 22,38 Q22,42 26,44 Q28,45 30,44Z" fill="#1a0a35"/>
      <ellipse cx="34" cy="35" rx="12" ry="16" fill="#1a0a35"/>
      <path d="M48,20 Q58,16 60,26 Q62,35 56,44 Q52,50 46,48 Q52,40 51,30 Q50,22 48,20Z" fill="#d4af37" opacity="0.9"/>
      <ellipse cx="36" cy="30" rx="8" ry="7" fill="#7c3aed" opacity="0.5"/>
      <path d="M30,30 Q28,26 30,23 Q33,20 36,23 Q39,20 42,23 Q44,26 42,30 Q44,34 42,37 Q39,40 36,37 Q33,40 30,37 Q28,34 30,30Z" fill="none" stroke="#d4af37" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="1.5" fill="#d4af37"/>
      <circle cx="55" cy="18" r="1.5" fill="#a78bfa"/>
      <circle cx="18" cy="48" r="1" fill="#a78bfa"/>
    </svg>
  </div>
  <div class="splash-name">AYA</div>
  <div class="splash-sub">AI</div>
  <div class="splash-by">by ARAZY</div>
  <div class="splash-loader"><div class="splash-loader-bar"></div></div>
</div>

<header>
  <div class="header-avatar" id="headerAvatar">🧠</div>
  <div class="header-info">
    <div class="header-name">Aya AI</div>
    <div class="header-status" id="statusText">● جاهزة للمساعدة</div>
  </div>
  <div class="header-mode">
    <button class="mode-btn active" id="modeKids" onclick="setMode('kids')">🌟 صغار</button>
    <button class="mode-btn" id="modeAdult" onclick="setMode('adult')">🎓 كبار</button>
  </div>
</header>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('dar', this)">🇲🇦 دارجة</button>
  <button class="lang-btn" onclick="setLang('ar', this)">🌙 عربية</button>
  <button class="lang-btn" onclick="setLang('fr', this)">🇫🇷 Français</button>
  <button class="lang-btn" onclick="setLang('en', this)">🇬🇧 English</button>
  <button class="lang-btn" onclick="setLang('es', this)">🇪🇸 Español</button>
</div>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✨</div>
    <h2>مرحبا! أنا آية</h2>
    <p>مساعدتك الذكية للتعلم<br>كيفاش نقدر نعاونك اليوم؟</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest('شرح لي الكسور')">📐 الكسور</div>
      <div class="suggestion" onclick="suggest('ما هي الضوء؟')">💡 الفيزياء</div>
      <div class="suggestion" onclick="suggest('اشرح التاريخ المغربي')">📜 التاريخ</div>
      <div class="suggestion" onclick="suggest('مساعدة في الانجليزية')">🔤 الإنجليزية</div>
      <div class="suggestion" onclick="suggest('شرح الخلية')">🔬 الأحياء</div>
      <div class="suggestion" onclick="suggest('الاقتصاد الجزئي')">📊 الاقتصاد</div>
    </div>
  </div>
</div>

<div class="input-area">
  <button id="voiceBtn" onclick="toggleVoice()">🔊</button>
  <textarea id="userInput" placeholder="اكتب سؤالك هنا..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 12L22 2 15 22 12 13 2 12Z"/></svg>
  </button>
</div>

<script>
  let currentMode = 'kids';
  let currentLang = 'dar';
  let messages = [];
  let isLoading = false;
  let voiceEnabled = true;
  const synth = window.speechSynthesis;

  function getLangCode() {
    const codes = { dar: 'ar-MA', ar: 'ar-SA', fr: 'fr-FR', en: 'en-US', es: 'es-ES' };
    return codes[currentLang] || 'ar-MA';
  }

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    document.getElementById('voiceBtn').textContent = voiceEnabled ? '🔊' : '🔇';
    if (!voiceEnabled) synth.cancel();
  }

  function speak(text) {
    if (!voiceEnabled) return;
    synth.cancel();
    const clean = text.replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
                      .replace(/\*\*/g, '').replace(/\*/g, '')
                      .replace(/<br>/g, ' ').trim();
    if (!clean) return;
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = getLangCode();
    utter.rate = 0.95;
    utter.pitch = 1.2;
    const voices = synth.getVoices();
    const femaleVoice = voices.find(v =>
      v.lang.startsWith(getLangCode().split('-')[0]) &&
      (v.name.toLowerCase().includes('female') || v.name.includes('Samira') || v.name.includes('Laila'))
    ) || voices.find(v => v.lang.startsWith(getLangCode().split('-')[0]));
    if (femaleVoice) utter.voice = femaleVoice;
    const btn = document.getElementById('voiceBtn');
    utter.onstart = () => btn.classList.add('speaking');
    utter.onend = () => btn.classList.remove('speaking');
    utter.onerror = () => btn.classList.remove('speaking');
    synth.speak(utter);
  }

  if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();

  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
  }, 2400);

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('modeKids').classList.toggle('active', mode === 'kids');
    document.getElementById('modeAdult').classList.toggle('active', mode === 'adult');
    document.getElementById('headerAvatar').textContent = mode === 'kids' ? '🌟' : '🎓';
  }

  function setLang(lang, el) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function getSystemPrompt() {
    const langInstructions = {
      dar: 'تحدث بالدارجة المغربية',
      ar: 'تحدث باللغة العربية الفصحى',
      fr: 'Réponds en français',
      en: 'Respond in English',
      es: 'Responde en español'
    };
    if (currentMode === 'kids') {
      return `أنت آية — مساعدة تعليمية ودودة للأطفال. ${langInstructions[currentLang]}. استعمل لغة بسيطة وإيموجيات ملونة. شجع الطفل دائماً. أنت من شركة Arazy.`;
    } else {
      return `أنت آية — مساعدة تعليمية احترافية للمرحلة الثانوية والجامعية. ${langInstructions[currentLang]}. كن دقيقاً وعلمياً. أنت من شركة Arazy.`;
    }
  }

  function suggest(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'aya' ? (currentMode === 'kids' ? '🌟' : '🎓') : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = content.replace(/\n/g, '<br>');
    div.appendChild(avatar);
    div.appendChild(bubble);
    document.getElementById('welcome')?.remove();
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg aya';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-avatar">⏳</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('statusText').textContent = '● تفكر...';

    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          system: getSystemPrompt(),
          messages: messages.slice(-10)
        })
      });

      document.getElementById('typing')?.remove();

      if (!response.ok) {
        const err = await response.json();
        addMessage('aya', `❌ خطأ: ${err.error?.message || 'مشكلة في الاتصال'}`);
        messages.pop();
      } else {
        const data = await response.json();
        const reply = data.content[0].text;
        messages.push({ role: 'assistant', content: reply });
        addMessage('aya', reply);
        speak(reply);
      }
    } catch(e) {
      document.getElementById('typing')?.remove();
      addMessage('aya', '❌ مشكلة في الاتصال — تحقق من الإنترنت');
      messages.pop();
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusText').textContent = '● جاهزة للمساعدة';
  }
</script>
</body>
</html>
